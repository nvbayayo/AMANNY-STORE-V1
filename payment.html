<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | AMANNY STORE</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">
<div class="logo">⚔️ AMANNY STORE</div>
</nav>

<section class="checkout-container">

<div class="checkout-card">

<h2>Complete Payment</h2>

<div class="summary-row">
<span>Server</span>
<strong id="serverName"></strong>
</div>

<div class="summary-row">
<span>Package</span>
<strong id="productName"></strong>
</div>

<div class="summary-row total">
<span>Total</span>
<strong>₹<span id="amount"></span></strong>
</div>

<hr>

<h3>Scan & Pay</h3>

<img
src="images/qr.png"
alt="QR Payment"
style="width:250px;max-width:100%;display:block;margin:20px auto;border-radius:15px;"
>

<p style="text-align:center;">
After payment, upload screenshot and send order.
</p>

<br>

<input
type="file"
id="paymentProof"
accept="image/*"
>

<br><br>

<button onclick="sendOrder()">
Send Order to WhatsApp
</button>

</div>

</section>

<script>

document.getElementById("serverName").textContent =
localStorage.getItem("server_name") || "-";

document.getElementById("productName").textContent =
localStorage.getItem("package_name") || "-";

document.getElementById("amount").textContent =
localStorage.getItem("package_price") || "0";

function sendOrder(){

const server =
localStorage.getItem("server_name");

const product =
localStorage.getItem("package_name");

const price =
localStorage.getItem("package_price");

const userId =
localStorage.getItem("mlbb_user_id") || "Not Provided";

const zoneId =
localStorage.getItem("mlbb_zone_id") || "Not Provided";

const phone = "91XXXXXXXXXX"; // replace with your WhatsApp number

const message = `🔥 MLBB ORDER

👤 User ID: ${userId}
🆔 Zone ID: ${zoneId}

🌍 Server: ${server}

💎 Package: ${product}

💰 Amount: ₹${price}

📌 Status: Payment Sent`;

window.open(
`https://wa.me/${phone}?text=${encodeURIComponent(message)}`,
"_blank"
);

}

</script>

</body>
</html>
